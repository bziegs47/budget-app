<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>mimo logo — preview</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: ui-sans-serif, system-ui, sans-serif;
        color: #334155;
      }
      .panel {
        padding: 2rem;
        min-height: 50vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1rem;
      }
      .panel.light {
        background: #f8fafc;
      }
      .panel.dark {
        background: #0f172a;
        color: #94a3b8;
      }
      .panel h2 {
        margin: 0;
        font-size: 0.75rem;
        font-weight: 600;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        opacity: 0.8;
      }
      .frame {
        padding: 2rem;
        border-radius: 1rem;
      }
      .panel.light .frame {
        background: #fff;
        box-shadow: 0 1px 3px rgba(15, 23, 42, 0.08);
      }
      .panel.dark .frame {
        background: #1e293b;
      }
      svg {
        display: block;
        width: min(320px, 80vw);
        height: auto;
      }
      p.hint {
        max-width: 36rem;
        margin: 0;
        font-size: 0.875rem;
        line-height: 1.5;
        text-align: center;
      }
      code {
        font-size: 0.8em;
        background: rgba(15, 23, 42, 0.06);
        padding: 0.15em 0.4em;
        border-radius: 0.25rem;
      }
      .panel.dark code {
        background: rgba(255, 255, 255, 0.08);
      }
    </style>
  </head>
  <body>
    <div class="panel light">
      <h2>Light background</h2>
      <div class="frame">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="none" role="img" aria-label="mimo">
          <title>mimo</title>
          <defs>
            <linearGradient id="mimoFillL" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#34d399" stop-opacity="0.4" />
              <stop offset="50%" stop-color="#10b981" stop-opacity="0.22" />
              <stop offset="100%" stop-color="#047857" stop-opacity="0.06" />
            </linearGradient>
            <linearGradient id="mimoLineL" x1="0" y1="0" x2="1" y2="0">
              <stop offset="0%" stop-color="#059669" />
              <stop offset="100%" stop-color="#34d399" />
            </linearGradient>
          </defs>
          <path
            d="M 36 148
               C 68 148, 84 82, 118 82
               C 148 82, 158 132, 184 108
               C 198 96, 208 90, 220 98
               L 220 178
               L 36 178
               Z"
            fill="url(#mimoFillL)"
          />
          <path
            d="M 36 148
               C 68 148, 84 82, 118 82
               C 148 82, 158 132, 184 108
               C 198 96, 208 90, 220 98"
            fill="none"
            stroke="url(#mimoLineL)"
            stroke-width="5"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
          <line
            x1="32"
            y1="178"
            x2="224"
            y2="178"
            stroke="#6ee7b7"
            stroke-width="3"
            stroke-linecap="round"
            opacity="0.5"
          />
        </svg>
      </div>
      <p class="hint">
        Inspiration mark: cashflow curve + soft fill (see <code>public/logo.svg</code>).
      </p>
    </div>
    <div class="panel dark">
      <h2>Dark background</h2>
      <div class="frame">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="none" role="img" aria-label="mimo">
          <title>mimo</title>
          <defs>
            <linearGradient id="mimoFillD" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#34d399" stop-opacity="0.35" />
              <stop offset="50%" stop-color="#10b981" stop-opacity="0.2" />
              <stop offset="100%" stop-color="#065f46" stop-opacity="0.12" />
            </linearGradient>
            <linearGradient id="mimoLineD" x1="0" y1="0" x2="1" y2="0">
              <stop offset="0%" stop-color="#6ee7b7" />
              <stop offset="100%" stop-color="#34d399" />
            </linearGradient>
          </defs>
          <path
            d="M 36 148
               C 68 148, 84 82, 118 82
               C 148 82, 158 132, 184 108
               C 198 96, 208 90, 220 98
               L 220 178
               L 36 178
               Z"
            fill="url(#mimoFillD)"
          />
          <path
            d="M 36 148
               C 68 148, 84 82, 118 82
               C 148 82, 158 132, 184 108
               C 198 96, 208 90, 220 98"
            fill="none"
            stroke="url(#mimoLineD)"
            stroke-width="5"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
          <line
            x1="32"
            y1="178"
            x2="224"
            y2="178"
            stroke="#047857"
            stroke-width="3"
            stroke-linecap="round"
            opacity="0.65"
          />
        </svg>
      </div>
      <p class="hint">Dark UI: brighter stroke gradient; baseline muted emerald.</p>
    </div>
  </body>
</html>
