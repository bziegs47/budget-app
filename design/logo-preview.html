<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>mimo logo — preview</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        font-family:
          ui-sans-serif,
          system-ui,
          sans-serif;
        color: #334155;
      }
      .panel {
        padding: 2rem;
        min-height: 50vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1rem;
      }
      .panel.light {
        background: #f8fafc;
      }
      .panel.dark {
        background: #0f172a;
        color: #94a3b8;
      }
      .panel h2 {
        margin: 0;
        font-size: 0.75rem;
        font-weight: 600;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        opacity: 0.8;
      }
      .frame {
        padding: 2rem;
        border-radius: 1rem;
        background: rgba(255, 255, 255, 0.03);
      }
      .panel.light .frame {
        background: #fff;
        box-shadow: 0 1px 3px rgba(15, 23, 42, 0.08);
      }
      .panel.dark .frame {
        background: #1e293b;
      }
      svg {
        display: block;
        width: min(320px, 80vw);
        height: auto;
      }
      p.hint {
        max-width: 36rem;
        margin: 0;
        font-size: 0.875rem;
        line-height: 1.5;
        text-align: center;
      }
      code {
        font-size: 0.8em;
        background: rgba(15, 23, 42, 0.06);
        padding: 0.15em 0.4em;
        border-radius: 0.25rem;
      }
      .panel.dark code {
        background: rgba(255, 255, 255, 0.08);
      }
    </style>
  </head>
