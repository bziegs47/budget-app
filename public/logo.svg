<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="none" role="img" aria-label="mimo">
  <title>mimo</title>
  <defs>
    <linearGradient id="coinFace" x1="15%" y1="10%" x2="85%" y2="90%">
      <stop offset="0%" stop-color="#34d399" />
      <stop offset="40%" stop-color="#6ee7b7" />
      <stop offset="70%" stop-color="#22c55e" />
      <stop offset="100%" stop-color="#15803d" />
    </linearGradient>
    <linearGradient id="coinEdge" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#047857" />
      <stop offset="100%" stop-color="#064e3b" />
    </linearGradient>
  </defs>
  <!-- Pipe: same curve, deep green so it stays secondary to money -->
  <path
    d="M 52 132 Q 128 88 204 132"
    stroke="#14532d"
    stroke-width="14"
    stroke-linecap="round"
    fill="none"
  />
  <!-- Coin: metallic disc + milled edge + relief center (currency cues) -->
  <g transform="translate(86 106)">
    <circle r="26" fill="url(#coinEdge)" />
    <circle r="23" fill="url(#coinFace)" stroke="#065f46" stroke-width="1.6" />
    <!-- Milled / reeded rim ticks -->
    <g stroke="#047857" stroke-width="1.4" stroke-linecap="round">
      <line x1="0" y1="-23" x2="0" y2="-19" transform="rotate(0)" />
      <line x1="0" y1="-23" x2="0" y2="-19" transform="rotate(22.5)" />
      <line x1="0" y1="-23" x2="0" y2="-19" transform="rotate(45)" />
      <line x1="0" y1="-23" x2="0" y2="-19" transform="rotate(67.5)" />
      <line x1="0" y1="-23" x2="0" y2="-19" transform="rotate(90)" />
      <line x1="0" y1="-23" x2="0" y2="-19" transform="rotate(112.5)" />
      <line x1="0" y1="-23" x2="0" y2="-19" transform="rotate(135)" />
      <line x1="0" y1="-23" x2="0" y2="-19" transform="rotate(157.5)" />
      <line x1="0" y1="-23" x2="0" y2="-19" transform="rotate(180)" />
      <line x1="0" y1="-23" x2="0" y2="-19" transform="rotate(202.5)" />
      <line x1="0" y1="-23" x2="0" y2="-19" transform="rotate(225)" />
      <line x1="0" y1="-23" x2="0" y2="-19" transform="rotate(247.5)" />
      <line x1="0" y1="-23" x2="0" y2="-19" transform="rotate(270)" />
      <line x1="0" y1="-23" x2="0" y2="-19" transform="rotate(292.5)" />
      <line x1="0" y1="-23" x2="0" y2="-19" transform="rotate(315)" />
      <line x1="0" y1="-23" x2="0" y2="-19" transform="rotate(337.5)" />
    </g>
    <circle r="15" fill="none" stroke="#166534" stroke-width="1.2" opacity="0.85" />
    <!-- Raised relief: stylized “seal” (two offset rings like mint mark) -->
    <circle r="6.5" fill="none" stroke="#15803d" stroke-width="1.3" />
    <circle cx="3" cy="-1" r="4" fill="none" stroke="#047857" stroke-width="1" opacity="0.9" />
    <circle cx="-3" cy="1" r="4" fill="none" stroke="#047857" stroke-width="1" opacity="0.9" />
  </g>
  <!-- Banknote: wide paper, portrait oval, filigree lines (reads as cash, not a tile) -->
  <g transform="translate(202 120) rotate(-9)">
    <rect x="-48" y="-13" width="96" height="26" rx="3" fill="#f7fee7" stroke="#3f6212" stroke-width="2" />
    <path
      d="M -42 -8.5 H 42 M -42 0 H 42 M -42 8.5 H 42"
      stroke="#84cc16"
      stroke-width="0.75"
      opacity="0.45"
    />
    <rect x="-41" y="-10" width="82" height="20" rx="2" fill="none" stroke="#65a30d" stroke-width="1" opacity="0.55" />
    <ellipse rx="11" ry="8" fill="#ecfccb" stroke="#4d7c0f" stroke-width="1.2" />
    <rect x="-2" y="-9" width="4" height="18" rx="1" fill="#bbf7d0" opacity="0.85" stroke="#22c55e" stroke-width="0.6" />
    <circle cx="-40" cy="-11" r="1.8" fill="#65a30d" />
    <circle cx="40" cy="-11" r="1.8" fill="#65a30d" />
    <circle cx="-40" cy="11" r="1.8" fill="#65a30d" />
    <circle cx="40" cy="11" r="1.8" fill="#65a30d" />
  </g>
</svg>
