<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="none" role="img" aria-label="mimo">
  <title>mimo</title>
  <defs>
    <linearGradient id="ledgerBind" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#047857" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
    <linearGradient id="ledgerRow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#059669" />
      <stop offset="100%" stop-color="#34d399" />
    </linearGradient>
  </defs>
  <!-- Ledger binding: notebook / register (planning, not market performance) -->
  <rect x="46" y="68" width="22" height="120" rx="11" fill="url(#ledgerBind)" />
  <!-- Rows = category lines / allocations (width differs like line items, not a time axis) -->
  <rect x="82" y="86" width="118" height="20" rx="10" fill="url(#ledgerRow)" opacity="0.95" />
  <rect x="82" y="118" width="156" height="20" rx="10" fill="url(#ledgerRow)" opacity="0.78" />
  <rect x="82" y="150" width="88" height="20" rx="10" fill="url(#ledgerRow)" opacity="0.58" />
</svg>
